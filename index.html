<!DOCTYPE html>
<html>
    <head>

        <title> 
            Schedule Program
        </title>

        <link rel='stylesheet' href ='style.css'>
    </head>

    <body>

        <div id="page_used">
            <div id="header">
                <div id ="month_year_display">

                </div>
                <div id = "nav_buttons">
                    <button id="prev_button">Prev</button>
                    <button id="next_button">Next</button>
                </div>
            </div>

            <div id="days">
                <div>Monday</div>
                <div>Tuesday</div>
                <div>Wednesday</div>
                <div>Thursday</div>
                <div>Friday</div>
                <div>Saturday</div>
                <div>Sunday</div>
            </div>
                
            <div id="calendar"></div>

            <div id="pop_up">
                <h2 id = "pop_up_header">Tasks</h2>
                
                <input id="task_input" placeholder="New Task">
                <button id="add_button">Add</button>
                <button id = "close_button">Close</button>

                <div id="task_zone">

                </div>
            </div>

           

        </div>


        <script src="main.js"></script>
    </body>

</html>
